name: Hydro-V CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

jobs:
  # ── Job 1: Tests del backend ────────────────────────────────────
  test-backend:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        working-directory: hydrov-backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Crear .env de prueba para CI
        working-directory: hydrov-backend
        run: |
          cat > .env << 'EOF'
          DEBUG=True
          ENVIRONMENT=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_USER=hydrov
          POSTGRES_PASSWORD=ci_test_password
          POSTGRES_DB=hydrov_test
          INFLUX_URL=http://localhost:8086
          INFLUX_TOKEN=ci_test_token
          INFLUX_ORG=hydrov
          INFLUX_BUCKET_TELEMETRY=sensor_telemetry
          INFLUX_BUCKET_NASA=nasa_weather_cache
          REDIS_HOST=localhost
          REDIS_PORT=6379
          MQTT_HOST=test.hivemq.cloud
          MQTT_PORT=8883
          MQTT_USER=ci_test
          MQTT_PASSWORD=ci_test_password
          SECRET_KEY=ci_test_secret_key_long_enough_for_hs256_algorithm_hydrov
          NASA_DEFAULT_LAT=19.4136
          NASA_DEFAULT_LON=-99.0151
          EOF

      - name: Ejecutar tests con coverage
        working-directory: hydrov-backend
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Subir coverage a Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: hydrov-backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 2: Linting ─────────────────────────────────────────────
  lint:
    name: Linting (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Ruff check
        working-directory: hydrov-backend
        run: ruff check app/ tests/ --output-format=github

  # ── Job 3: Build Docker images ──────────────────────────────────
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push Backend
        uses: docker/build-push-action@v5
        with:
          context:   ./hydrov-backend
          file:      ./infra/docker/backend.Dockerfile
          push:      true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build y push Frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./hydrov-frontend
          file:      ./infra/docker/frontend.Dockerfile
          push:      true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  # ── Job 4: Deploy a staging ─────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ~/hydro-v
            git pull origin main
            bash hydrov-backend/scripts/deploy.sh staging
