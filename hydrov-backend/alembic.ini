# Hydro-V — Alembic configuration
# La cadena de conexión REAL se inyecta desde config.py en env.py.
# Esta URL es un placeholder que Alembic nunca usa directamente.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder — env.py lo sobreescribe con POSTGRES_DSN_SYNC
sqlalchemy.url = postgresql://hydrov:changeme@localhost:5432/hydrov

[post_write_hooks]
# Sin hooks por ahora

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
