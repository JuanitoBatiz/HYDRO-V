# hydrov-frontend/default.conf
# ─────────────────────────────────────────────────────────────────
#  Nginx para HYDRO-V (stage de producción dentro de Docker)
#  Puerto 80  →  /api/*  al backend | /*  a la SPA de React
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Archivos estáticos de Vite (copiados en el build)
    root  /usr/share/nginx/html;
    index index.html;

    # ── 1. SPA  ──────────────────────────────────────────────────
    # React Router: cualquier ruta desconocida → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 2. WebSockets de telemetría (debe ir ANTES de /api/) ─────
    location ~ ^/api/v1/telemetry/ws/ {
        proxy_pass         http://hydrov-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 3. REST API → FastAPI ─────────────────────────────────────
    # proxy_pass con ruta explícita evita dobles barras (/api//v1)
    location /api/ {
        proxy_pass         http://hydrov-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── 4. Health‑check ──────────────────────────────────────────
    location /health {
        proxy_pass       http://hydrov-backend:8000/health;
        proxy_set_header Host $host;
    }

    # ── 5. FastAPI docs (dev) ─────────────────────────────────────
    location /docs {
        proxy_pass       http://hydrov-backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass       http://hydrov-backend:8000/openapi.json;
        proxy_set_header Host $host;
    }
}
