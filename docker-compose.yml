services:

  # ── PostgreSQL 15 ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hydrov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hydrov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hydrov}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hydrov} -d ${POSTGRES_DB:-hydrov}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydrov-net

  # ── InfluxDB 2.7 ────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: hydrov-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:-admin1234}
      DOCKER_INFLUXDB_INIT_ORG: hydrov
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_telemetry
      DOCKER_INFLUXDB_INIT_RETENTION: 720h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8086/ping || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - hydrov-net

  # ── Redis 7.2 ───────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: hydrov-redis
    restart: unless-stopped
    command: >
      redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      # Se agrega el comando sh -c y la bandera -a para pasar el password, y --no-auth-warning para no saturar los logs
      test: [ "CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD}\" ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydrov-net

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./hydrov-backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: hydrov-backend
    restart: unless-stopped
    env_file:
      - .env # <--- ¡CORRECCIÓN MÁGICA AQUÍ! AHORA LEE LA RAÍZ
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      INFLUX_URL: http://influxdb:8086
      PYTHONPATH: "/app:/hydrov-ml"
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-hydrov_grafana_secret_2026}
    volumes:
      - ./hydrov-backend:/app
      - ./hydrov-ml:/hydrov-ml:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hydrov-net
    # Encadena migración Alembic antes de arrancar el servidor.
    # Garantiza que el esquema esté siempre actualizado en cada deploy.
    command: >
      bash -c "
        echo '[entrypoint] Ejecutando alembic upgrade head...' &&
        alembic upgrade head &&
        echo '[entrypoint] Migraciones OK. Arrancando uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
      "

  # ── Frontend React/Vite (Nginx SPA + reverse proxy a /api/) ───────
  frontend:
    build:
      context: ./hydrov-frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    container_name: hydrov-frontend
    restart: unless-stopped
    # NOTA: VITE_API_URL se lee en BUILD TIME desde hydrov-frontend/.env
    # No se pasa como environment de runtime porque Vite ya la compiló.
    ports:
      - "80:80"   # ← Puerto estándar HTTP; accede desde el móvil con http://192.168.68.58
    depends_on:
      - backend
    networks:
      - hydrov-net

  # ── Nginx reverse proxy (DESACTIVADO) ──────────────────────────
  # El contenedor 'frontend' ya incluye Nginx con proxy inverso a /api/.
  # Este servicio separado ya no es necesario en esta arquitectura.
  # Si lo necesitas para otro propósito, descomenta el bloque:
  # nginx:
  #   image: nginx:alpine
  #   container_name: hydrov-nginx
  #   restart: unless-stopped
  #   volumes:
  #     - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - hydrov-net

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: hydrov-grafana
    restart: unless-stopped
    environment:
      GF_INSTALL_PLUGINS: "yesoreyeram-infinity-datasource"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hydrov2024}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-hydrov}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hydrov}
      POSTGRES_USER: ${POSTGRES_USER:-hydrov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-hydrov_grafana_secret_2026}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hydrov-net

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
  redis_data:
  grafana_data:


networks:
  hydrov-net:
    driver: bridge
