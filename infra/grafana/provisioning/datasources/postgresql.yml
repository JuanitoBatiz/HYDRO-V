# infra/grafana/provisioning/datasources/postgresql.yml
# ─────────────────────────────────────────────────────────────────
#  Datasource de PostgreSQL para Grafana — Hydro-V
#  Usado para: mapa de nodos, alertas, predicciones IA
# ─────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: HydroV-PostgreSQL
    type: postgres
    uid: hydrov-postgres
    access: proxy
    url: postgres:5432
    database: hydrov
    user: hydrov
    isDefault: false
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    editable: true