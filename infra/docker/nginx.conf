# infra/docker/nginx.conf
# ─────────────────────────────────────────────────────────────────
#  Nginx como reverse proxy para Hydro-V
#  Puerto 80 → enruta /api/* al backend y /* al frontend
#  Soporta WebSocket upgrades para /api/v1/telemetry/ws/*
# ─────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream servers ─────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:5173;
        keepalive 16;
    }

    # ── Server block principal ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Tamaño máximo de body (payload de telemetría)
        client_max_body_size 10m;

        # ── API REST → FastAPI ────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── WebSocket /api/v1/telemetry/ws/* ─────────────────────
        location ~ ^/api/v1/telemetry/ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;   # 1 hora — conexiones WS largas
            proxy_send_timeout 3600s;
        }

        # ── Docs FastAPI (solo en dev) ────────────────────────────
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Health check del backend ──────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Frontend React SPA ────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;

            # React Router — todas las rutas al index.html
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://frontend;
        }
    }
}
